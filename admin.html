<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flora Dew — Order Dashboard</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,450;0,9..144,600;1,9..144,450;1,9..144,600&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --moss-ink:#243623;
    --milk-sage:#eef1e6;
    --milk-sage-2:#e3e8d6;
    --rosewater:#c4707c;
    --rosewater-deep:#a5525e;
    --honey-oil:#c2963a;
    --fern:#4e6b4c;
    --paper:#f8f8f3;
    --line: rgba(36,54,35,0.14);
    --shadow-soft: 0 20px 40px -24px rgba(36,54,35,0.35);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--milk-sage);
    color:var(--moss-ink);
    font-family:'Work Sans', sans-serif;
    line-height:1.5;
    min-height:100vh;
  }
  h1,h2,h3{font-family:'Fraunces', serif; font-weight:450; letter-spacing:-0.01em;}
  a{color:inherit;}
  .wrap{max-width:1100px; margin:0 auto; padding:28px clamp(16px,4vw,40px) 80px;}

  /* ---------- Login gate ---------- */
  .gate{
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding:20px;
  }
  .gate-card{
    background:var(--paper);
    border-radius:22px;
    padding:36px clamp(24px,5vw,44px);
    width:min(400px, 100%);
    box-shadow:var(--shadow-soft);
    text-align:center;
  }
  .gate-card h1{font-size:1.6rem; margin-bottom:6px;}
  .gate-card p{font-size:0.9rem; color:rgba(36,54,35,0.65); margin-bottom:22px;}
  .gate-card input{
    width:100%;
    border:1px solid var(--line);
    background:#fff;
    border-radius:10px;
    padding:12px 14px;
    font-size:0.95rem;
    font-family:inherit;
    margin-bottom:14px;
  }
  .gate-card input:focus{outline:none; border-color:var(--fern);}
  .gate-card button{
    width:100%;
    background:var(--moss-ink); color:var(--milk-sage);
    border:none; border-radius:100px;
    padding:13px; font-size:0.95rem; font-weight:600;
    cursor:pointer;
  }
  .gate-error{color:var(--rosewater-deep); font-size:0.85rem; margin-top:12px; display:none;}

  /* ---------- Dashboard header ---------- */
  .dash-header{
    display:flex; justify-content:space-between; align-items:center;
    flex-wrap:wrap; gap:14px;
    margin-bottom:26px;
  }
  .dash-header h1{font-size:1.8rem;}
  .dash-header .logo-dot{width:9px;height:9px;border-radius:50%;background:var(--rosewater); display:inline-block; margin-right:8px;}
  .header-actions{display:flex; gap:10px; flex-wrap:wrap;}
  .btn{
    border-radius:100px;
    padding:10px 18px;
    font-size:0.85rem;
    font-weight:600;
    cursor:pointer;
    border:1px solid var(--line);
    background:#fff;
  }
  .btn:hover{background:var(--milk-sage-2);}
  .btn-primary{background:var(--moss-ink); color:var(--milk-sage); border-color:var(--moss-ink);}
  .btn-primary:hover{opacity:0.92; background:var(--moss-ink);}

  /* ---------- Stats ---------- */
  .stats-row{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(150px, 1fr));
    gap:14px;
    margin-bottom:26px;
  }
  .stat-card{
    background:var(--paper);
    border-radius:16px;
    padding:18px 20px;
    box-shadow:var(--shadow-soft);
  }
  .stat-card .stat-label{font-size:0.72rem; text-transform:uppercase; letter-spacing:0.06em; color:rgba(36,54,35,0.55); margin-bottom:6px;}
  .stat-card .stat-value{font-family:'Fraunces',serif; font-size:1.7rem; font-weight:600;}

  /* ---------- Controls ---------- */
  .controls{
    display:flex; gap:12px; flex-wrap:wrap;
    margin-bottom:20px;
  }
  .controls input[type="text"]{
    flex:1; min-width:200px;
    border:1px solid var(--line);
    background:#fff;
    border-radius:10px;
    padding:11px 14px;
    font-family:inherit;
    font-size:0.9rem;
  }
  .controls select{
    border:1px solid var(--line);
    background:#fff;
    border-radius:10px;
    padding:11px 14px;
    font-family:inherit;
    font-size:0.9rem;
  }
  .controls input:focus, .controls select:focus{outline:none; border-color:var(--fern);}

  /* ---------- Order cards ---------- */
  .order-list{display:flex; flex-direction:column; gap:14px;}
  .order-card{
    background:var(--paper);
    border-radius:16px;
    padding:20px 22px;
    box-shadow:var(--shadow-soft);
  }
  .order-top{
    display:flex; justify-content:space-between; align-items:flex-start;
    flex-wrap:wrap; gap:10px;
    margin-bottom:14px;
    padding-bottom:14px;
    border-bottom:1px solid var(--line);
  }
  .order-customer{font-size:1.05rem; font-weight:600;}
  .order-meta{font-size:0.8rem; color:rgba(36,54,35,0.6); margin-top:3px;}
  .status-badge{
    font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:0.04em;
    padding:5px 12px; border-radius:100px;
  }
  .status-paid{background:rgba(78,107,76,0.15); color:var(--fern);}
  .status-pending{background:rgba(194,150,58,0.18); color:var(--honey-oil);}
  .fulfillment-badge{
    font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:0.04em;
    padding:5px 12px; border-radius:100px;
    background:rgba(36,54,35,0.08); color:var(--moss-ink);
  }
  .fulfillment-badge.f-shipped{background:rgba(76,120,190,0.15); color:#3a5f9e;}
  .fulfillment-badge.f-delivered{background:rgba(78,107,76,0.15); color:var(--fern);}
  .fulfillment-badge.f-accepted{background:rgba(194,150,58,0.18); color:var(--honey-oil);}
  .badge-group{display:flex; gap:8px; flex-wrap:wrap; align-items:center;}
  .fulfillment-controls{
    margin-top:14px; padding-top:14px; border-top:1px dashed var(--line);
    display:grid; grid-template-columns:1fr 1fr 1fr auto; gap:10px; align-items:end;
  }
  @media (max-width:720px){ .fulfillment-controls{grid-template-columns:1fr 1fr;} }
  .fulfillment-controls label{display:block; font-size:0.7rem; text-transform:uppercase; letter-spacing:0.04em; color:rgba(36,54,35,0.55); margin-bottom:5px;}
  .fulfillment-controls select, .fulfillment-controls input{
    width:100%; border:1px solid var(--line); background:#fff;
    border-radius:8px; padding:8px 10px; font-family:inherit; font-size:0.85rem;
  }
  .save-order-btn{
    background:var(--moss-ink); color:var(--milk-sage); border:none;
    border-radius:8px; padding:9px 16px; font-size:0.82rem; font-weight:600; cursor:pointer;
    white-space:nowrap;
  }
  .save-order-btn:disabled{opacity:0.5;}
  .save-msg{font-size:0.75rem; margin-top:8px; display:none;}
  .save-msg.ok{color:var(--fern); display:block;}
  .save-msg.err{color:var(--rosewater-deep); display:block;}
  .order-body{display:grid; grid-template-columns:1.3fr 1fr; gap:20px;}
  @media (max-width:640px){ .order-body{grid-template-columns:1fr;} }
  .order-items{font-size:0.88rem;}
  .order-items .item-row{display:flex; justify-content:space-between; padding:4px 0;}
  .order-items .item-total{font-weight:700; border-top:1px solid var(--line); margin-top:6px; padding-top:8px;}
  .order-contact{font-size:0.85rem; color:rgba(36,54,35,0.8);}
  .order-contact div{margin-bottom:4px;}
  .order-contact .oc-label{font-weight:600; color:var(--moss-ink);}
  .order-ids{font-size:0.72rem; color:rgba(36,54,35,0.45); margin-top:12px; word-break:break-all;}

  /* ---------- Tabs ---------- */
  .tab-nav{display:flex; gap:8px; margin-bottom:22px; flex-wrap:wrap;}
  .tab-btn{
    border:1px solid var(--line); background:#fff; color:var(--moss-ink);
    border-radius:100px; padding:9px 18px; font-size:0.85rem; font-weight:600; cursor:pointer;
  }
  .tab-btn.active{background:var(--moss-ink); color:var(--milk-sage); border-color:var(--moss-ink);}
  .tab-panel{display:none;}
  .tab-panel.active{display:block;}

  /* ---------- Product image manager ---------- */
  .pm-controls{display:flex; gap:12px; flex-wrap:wrap; margin-bottom:20px;}
  .pm-controls select{
    border:1px solid var(--line); background:#fff; border-radius:10px;
    padding:11px 14px; font-family:inherit; font-size:0.9rem;
  }
  .pm-grid{display:flex; flex-direction:column; gap:14px;}
  .pm-card{background:var(--paper); border-radius:16px; padding:18px 20px; box-shadow:var(--shadow-soft);}
  .pm-card-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; flex-wrap:wrap; gap:8px;}
  .pm-card-head .pm-name{font-weight:600; font-size:1rem;}
  .pm-card-head .pm-count{font-size:0.78rem; color:rgba(36,54,35,0.55);}
  .pm-thumbs{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:12px;}
  .pm-thumb{position:relative; width:76px; height:76px; border-radius:10px; overflow:hidden; border:1px solid var(--line);}
  .pm-thumb img{width:100%; height:100%; object-fit:cover; display:block;}
  .pm-thumb .pm-thumb-del{
    position:absolute; top:2px; right:2px; width:20px; height:20px; border-radius:50%;
    background:rgba(165,82,94,0.9); color:#fff; border:none; font-size:0.75rem; cursor:pointer; line-height:20px;
  }
  .pm-upload-row{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
  .pm-upload-row input[type="file"]{font-size:0.82rem;}
  .pm-upload-msg{font-size:0.78rem; margin-left:4px;}
  .pm-upload-msg.err{color:var(--rosewater-deep);}
  .pm-upload-msg.ok{color:var(--fern);}

  /* ---------- Store status panel ---------- */
  .settings-card{background:var(--paper); border-radius:16px; padding:24px 26px; box-shadow:var(--shadow-soft); max-width:520px;}
  .settings-card h3{font-size:1.15rem; margin-bottom:16px;}
  .toggle-row{display:flex; align-items:center; gap:12px; margin-bottom:18px;}
  .toggle-switch{position:relative; width:46px; height:26px; flex-shrink:0;}
  .toggle-switch input{opacity:0; width:0; height:0;}
  .toggle-slider{
    position:absolute; inset:0; background:rgba(36,54,35,0.2); border-radius:100px; cursor:pointer; transition:background 0.2s;
  }
  .toggle-slider:before{
    content:''; position:absolute; width:20px; height:20px; left:3px; top:3px; background:#fff; border-radius:50%; transition:transform 0.2s;
  }
  .toggle-switch input:checked + .toggle-slider{background:var(--rosewater-deep);}
  .toggle-switch input:checked + .toggle-slider:before{transform:translateX(20px);}
  .settings-card label{display:block; font-size:0.78rem; text-transform:uppercase; letter-spacing:0.04em; color:rgba(36,54,35,0.55); margin-bottom:6px;}
  .settings-card textarea, .settings-card input[type="text"]{
    width:100%; border:1px solid var(--line); background:#fff; border-radius:10px;
    padding:11px 14px; font-family:inherit; font-size:0.9rem; margin-bottom:16px;
  }
  .settings-card textarea{min-height:80px; resize:vertical;}
  .settings-save-msg{font-size:0.82rem; margin-top:4px; display:none;}
  .settings-save-msg.ok{color:var(--fern); display:block;}
  .settings-save-msg.err{color:var(--rosewater-deep); display:block;}

  .empty-state{
    text-align:center; padding:60px 20px;
    color:rgba(36,54,35,0.55);
    font-size:0.95rem;
  }
  .loading{text-align:center; padding:60px 20px; color:rgba(36,54,35,0.6);}
</style>
</head>
<body>

<!-- LOGIN GATE -->
<div class="gate" id="gate">
  <div class="gate-card">
    <h1>Order Dashboard</h1>
    <p>Enter your admin secret to view Flora Dew orders.</p>
    <input type="password" id="secret-input" placeholder="Admin secret" autocomplete="off">
    <button id="unlock-btn">Unlock</button>
    <div class="gate-error" id="gate-error">Incorrect secret, or none set yet — check ADMIN_SECRET in Netlify.</div>
  </div>
</div>

<!-- DASHBOARD (hidden until unlocked) -->
<div class="wrap" id="dashboard" style="display:none;">
  <div class="dash-header">
    <h1><span class="logo-dot"></span>Flora Dew Orders</h1>
    <div class="header-actions">
      <button class="btn" id="refresh-btn">↻ Refresh</button>
      <button class="btn" id="export-btn">⤓ Export CSV</button>
      <button class="btn" id="lock-btn">Lock</button>
    </div>
  </div>

  <div class="tab-nav">
    <button class="tab-btn active" data-tab="orders">Orders</button>
    <button class="tab-btn" data-tab="products">Product Photos</button>
    <button class="tab-btn" data-tab="settings">Store Status</button>
  </div>

  <div class="tab-panel active" id="tab-orders">
    <div class="stats-row" id="stats-row"></div>

    <div class="controls">
      <input type="text" id="search-input" placeholder="Search by name, phone, email, or order ID…">
      <select id="status-filter">
        <option value="all">All payment statuses</option>
        <option value="paid">Paid</option>
        <option value="pending">Pending payment</option>
      </select>
      <select id="fulfillment-filter">
        <option value="all">All fulfillment stages</option>
        <option value="pending">Pending</option>
        <option value="accepted">Accepted</option>
        <option value="shipped">Shipped</option>
        <option value="delivered">Delivered</option>
      </select>
    </div>

    <div id="order-list" class="order-list">
      <div class="loading">Loading orders…</div>
    </div>
  </div>

  <div class="tab-panel" id="tab-products">
    <div class="pm-controls">
      <select id="pm-category-filter">
        <option value="all">All categories</option>
        <option value="soap">Soaps</option>
        <option value="oil">Hair Oil</option>
        <option value="balm">Lip Balms</option>
        <option value="lipstick">Lip Colour</option>
      </select>
    </div>
    <div id="pm-grid" class="pm-grid">
      <div class="loading">Loading products…</div>
    </div>
  </div>

  <div class="tab-panel" id="tab-settings">
    <div class="settings-card">
      <h3>Holiday / temporary closure</h3>
      <div class="toggle-row">
        <span class="toggle-switch">
          <input type="checkbox" id="store-closed-toggle">
          <span class="toggle-slider"></span>
        </span>
        <span>Store is currently <strong id="store-status-label">open</strong></span>
      </div>
      <label for="store-message">Message shown to customers</label>
      <textarea id="store-message" placeholder="e.g. We're on a short holiday break and will resume taking orders soon. Thank you for your patience!"></textarea>
      <label for="store-reopen-date">Expected reopen date (optional, shown as text)</label>
      <input type="text" id="store-reopen-date" placeholder="e.g. 12 July 2026">
      <button class="btn btn-primary" id="save-settings-btn">Save store status</button>
      <div class="settings-save-msg" id="settings-save-msg"></div>
    </div>
  </div>
</div>

<script>
  var ALL_ORDERS = [];

  var gate = document.getElementById('gate');
  var dashboard = document.getElementById('dashboard');
  var secretInput = document.getElementById('secret-input');
  var gateError = document.getElementById('gate-error');

  function currentSecret(){
    return sessionStorage.getItem('fd_admin_secret') || '';
  }

  function tryUnlock(secret){
    fetch('/.netlify/functions/list-orders?secret=' + encodeURIComponent(secret))
      .then(function(res){
        if(!res.ok) throw new Error('unauthorized');
        return res.json();
      })
      .then(function(orders){
        sessionStorage.setItem('fd_admin_secret', secret);
        ALL_ORDERS = orders || [];
        gate.style.display = 'none';
        dashboard.style.display = 'block';
        renderAll();
        loadProductManager();
        loadStoreSettings();
      })
      .catch(function(){
        gateError.style.display = 'block';
      });
  }

  document.querySelectorAll('.tab-btn').forEach(function(btn){
    btn.addEventListener('click', function(){
      document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
      document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.remove('active'); });
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    });
  });

  document.getElementById('unlock-btn').addEventListener('click', function(){
    gateError.style.display = 'none';
    var val = secretInput.value.trim();
    if(!val) return;
    tryUnlock(val);
  });
  secretInput.addEventListener('keydown', function(e){
    if(e.key === 'Enter') document.getElementById('unlock-btn').click();
  });

  document.getElementById('lock-btn').addEventListener('click', function(){
    sessionStorage.removeItem('fd_admin_secret');
    dashboard.style.display = 'none';
    gate.style.display = 'flex';
    secretInput.value = '';
  });

  document.getElementById('refresh-btn').addEventListener('click', function(){
    tryUnlock(currentSecret());
  });

  // Auto-unlock if this browser tab already unlocked earlier in the session
  (function(){
    var existing = currentSecret();
    if(existing) tryUnlock(existing);
  })();

  function fmtDate(iso){
    if(!iso) return '—';
    var d = new Date(iso);
    return d.toLocaleString('en-IN', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
  }

  function orderTotal(order){
    return order.items.reduce(function(sum, it){ return sum + it.price * it.qty; }, 0);
  }

  function renderStats(orders){
    var paid = orders.filter(function(o){ return o.status === 'paid'; });
    var pending = orders.filter(function(o){ return o.status === 'pending'; });
    var revenue = paid.reduce(function(sum, o){ return sum + orderTotal(o); }, 0);

    var stats = [
      { label:'Total orders', value: orders.length },
      { label:'Paid', value: paid.length },
      { label:'Pending', value: pending.length },
      { label:'Revenue (paid)', value: '₹' + revenue.toLocaleString('en-IN') }
    ];

    document.getElementById('stats-row').innerHTML = stats.map(function(s){
      return '<div class="stat-card"><div class="stat-label">'+s.label+'</div><div class="stat-value">'+s.value+'</div></div>';
    }).join('');
  }

  var FULFILLMENT_LABELS = { pending:'Pending', accepted:'Accepted', shipped:'Shipped', delivered:'Delivered' };

  function renderOrders(orders){
    var listEl = document.getElementById('order-list');
    if(orders.length === 0){
      listEl.innerHTML = '<div class="empty-state">No orders match this view yet.</div>';
      return;
    }

    listEl.innerHTML = orders.map(function(order){
      var total = orderTotal(order);
      var itemRows = order.items.map(function(it){
        return '<div class="item-row"><span>'+it.name+' ('+it.variant+') × '+it.qty+'</span><span>₹'+(it.price*it.qty)+'</span></div>';
      }).join('');
      var statusClass = order.status === 'paid' ? 'status-paid' : 'status-pending';
      var fulfillment = order.fulfillmentStatus || 'pending';
      var c = order.customer || {};
      var safeId = 'ord_' + order.orderId.replace(/[^a-zA-Z0-9]/g, '');

      var fulfillmentOptions = ['pending','accepted','shipped','delivered'].map(function(key){
        return '<option value="'+key+'"'+(key === fulfillment ? ' selected' : '')+'>'+FULFILLMENT_LABELS[key]+'</option>';
      }).join('');

      return '' +
        '<div class="order-card" data-order-id="'+order.orderId+'">' +
          '<div class="order-top">' +
            '<div>' +
              '<div class="order-customer">'+(c.name || 'Unknown customer')+'</div>' +
              '<div class="order-meta">'+fmtDate(order.paidAt || order.createdAt)+'</div>' +
            '</div>' +
            '<div class="badge-group">' +
              '<span class="status-badge '+statusClass+'">'+order.status+'</span>' +
              '<span class="fulfillment-badge f-'+fulfillment+'">'+FULFILLMENT_LABELS[fulfillment]+'</span>' +
            '</div>' +
          '</div>' +
          '<div class="order-body">' +
            '<div class="order-items">' +
              itemRows +
              '<div class="item-row item-total"><span>Total</span><span>₹'+total+'</span></div>' +
            '</div>' +
            '<div class="order-contact">' +
              '<div><span class="oc-label">Phone:</span> '+(c.phone || '—')+'</div>' +
              '<div><span class="oc-label">Email:</span> '+(c.email || '—')+'</div>' +
              '<div><span class="oc-label">Address:</span> '+(c.address || '—')+', '+(c.city || '')+', '+(c.state || '')+' - '+(c.pincode || '')+'</div>' +
            '</div>' +
          '</div>' +
          '<div class="order-ids">Order: '+order.orderId+(order.paymentId ? ' · Payment: '+order.paymentId : '')+'</div>' +
          '<div class="fulfillment-controls">' +
            '<div>' +
              '<label>Fulfillment status</label>' +
              '<select id="'+safeId+'_status">'+fulfillmentOptions+'</select>' +
            '</div>' +
            '<div>' +
              '<label>Courier name</label>' +
              '<input type="text" id="'+safeId+'_courier" value="'+(order.courier || '')+'" placeholder="e.g. Delhivery">' +
            '</div>' +
            '<div>' +
              '<label>AWB / Tracking No.</label>' +
              '<input type="text" id="'+safeId+'_awb" value="'+(order.awb || '')+'" placeholder="e.g. 123456789012">' +
            '</div>' +
            '<button class="save-order-btn" data-save-for="'+order.orderId+'">Save</button>' +
          '</div>' +
          '<div class="save-msg" id="'+safeId+'_msg"></div>' +
        '</div>';
    }).join('');

    // Wire up Save buttons after render
    listEl.querySelectorAll('.save-order-btn').forEach(function(btn){
      btn.addEventListener('click', function(){
        var orderId = btn.getAttribute('data-save-for');
        var safeId = 'ord_' + orderId.replace(/[^a-zA-Z0-9]/g, '');
        var fulfillmentStatus = document.getElementById(safeId + '_status').value;
        var courier = document.getElementById(safeId + '_courier').value.trim();
        var awb = document.getElementById(safeId + '_awb').value.trim();
        var msgEl = document.getElementById(safeId + '_msg');

        btn.disabled = true;
        btn.textContent = 'Saving…';
        msgEl.className = 'save-msg';
        msgEl.textContent = '';

        fetch('/.netlify/functions/update-order', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            secret: currentSecret(),
            orderId: orderId,
            fulfillmentStatus: fulfillmentStatus,
            courier: courier,
            awb: awb
          })
        })
          .then(function(res){
            if(!res.ok) throw new Error('save failed');
            return res.json();
          })
          .then(function(result){
            btn.disabled = false;
            btn.textContent = 'Save';
            msgEl.className = 'save-msg ok';
            msgEl.textContent = 'Saved' + (fulfillmentStatus === 'shipped' && courier && awb ? ' — shipping email sent to customer.' : '.');

            // Update in-memory copy so filters/stats/badges reflect the change
            var idx = ALL_ORDERS.findIndex(function(o){ return o.orderId === orderId; });
            if(idx !== -1) ALL_ORDERS[idx] = result.order;
            renderStats(ALL_ORDERS);
          })
          .catch(function(){
            btn.disabled = false;
            btn.textContent = 'Save';
            msgEl.className = 'save-msg err';
            msgEl.textContent = 'Could not save — please try again.';
          });
      });
    });
  }

  function applyFilters(){
    var q = document.getElementById('search-input').value.trim().toLowerCase();
    var status = document.getElementById('status-filter').value;
    var fulfillment = document.getElementById('fulfillment-filter').value;

    var filtered = ALL_ORDERS.filter(function(order){
      if(status !== 'all' && order.status !== status) return false;
      if(fulfillment !== 'all' && (order.fulfillmentStatus || 'pending') !== fulfillment) return false;
      if(!q) return true;
      var c = order.customer || {};
      var haystack = [c.name, c.phone, c.email, order.orderId, order.paymentId].join(' ').toLowerCase();
      return haystack.indexOf(q) !== -1;
    });

    renderOrders(filtered);
  }

  function renderAll(){
    renderStats(ALL_ORDERS);
    applyFilters();
  }

  document.getElementById('search-input').addEventListener('input', applyFilters);
  document.getElementById('status-filter').addEventListener('change', applyFilters);
  document.getElementById('fulfillment-filter').addEventListener('change', applyFilters);

  document.getElementById('export-btn').addEventListener('click', function(){
    if(ALL_ORDERS.length === 0) return;
    var header = ['Order ID','Status','Date','Name','Phone','Email','Address','City','State','Pincode','Items','Total','Payment ID'];
    var rows = ALL_ORDERS.map(function(o){
      var c = o.customer || {};
      var itemsStr = o.items.map(function(it){ return it.name+' ('+it.variant+') x'+it.qty; }).join('; ');
      return [
        o.orderId, o.status, fmtDate(o.paidAt || o.createdAt),
        c.name, c.phone, c.email, c.address, c.city, c.state, c.pincode,
        itemsStr, orderTotal(o), o.paymentId || ''
      ].map(function(v){
        v = (v === undefined || v === null) ? '' : String(v);
        return '"' + v.replace(/"/g,'""') + '"';
      }).join(',');
    });
    var csv = [header.join(',')].concat(rows).join('\n');
    var blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'flora-dew-orders-' + new Date().toISOString().slice(0,10) + '.csv';
    a.click();
    URL.revokeObjectURL(url);
  });

  // =====================================================================
  // Product photo manager
  // =====================================================================
  // Mirrors the product catalog in index.html (id/name/category only —
  // this is just enough to know which products exist and let you attach
  // photos to each one; prices/descriptions still live in index.html).
  var PRODUCTS_META = [
    { id:'aloe-vera-soap', name:'Aloe Vera Handmade Soap', cat:'soap' },
    { id:'charcoal-soap', name:'Charcoal Handmade Soap', cat:'soap' },
    { id:'charcoal-multani-mitti-soap', name:'Charcoal & Multani Mitti Soap', cat:'soap' },
    { id:'neem-soap', name:'Neem Handmade Soap', cat:'soap' },
    { id:'sandalwood-soap', name:'Sandalwood Handmade Soap', cat:'soap' },
    { id:'hibiscus-aloe-vera-soap', name:'Hibiscus & Aloe Vera Soap', cat:'soap' },
    { id:'kesar-oats-soap', name:'Kesar Oats Bath Soap', cat:'soap' },
    { id:'avarampoo-soap', name:'Avarampoo Cold-Processed Soap', cat:'soap' },
    { id:'gentle-baby-soap', name:'Gentle Baby Soap', cat:'soap' },
    { id:'hanging-grape-soap', name:'Handcrafted Hanging Grape Bunch Soap', cat:'soap' },
    { id:'12-herbs-hair-oil', name:'12 Herbs Hair Growth Oil', cat:'oil' },
    { id:'beetroot-shea-lip-balm', name:'Beetroot & Shea Butter Lip Balm', cat:'balm' },
    { id:'natural-creamy-lip-balm', name:'Natural Creamy Lip Balm', cat:'balm' },
    { id:'semi-matte-lipstick', name:'Semi-Matte Lipstick', cat:'lipstick' }
  ];
  var MAX_IMAGES_PER_PRODUCT = 8;
  var PRODUCT_IMAGES = {}; // productId -> array of data-URLs, loaded from the server

  function loadProductManager(){
    fetch('/.netlify/functions/product-images')
      .then(function(res){ return res.json(); })
      .then(function(images){
        PRODUCT_IMAGES = images || {};
        renderProductManager();
      })
      .catch(function(){
        document.getElementById('pm-grid').innerHTML = '<div class="empty-state">Could not load product photos.</div>';
      });
  }

  function renderProductManager(){
    var catFilter = document.getElementById('pm-category-filter').value;
    var gridEl = document.getElementById('pm-grid');
    var list = PRODUCTS_META.filter(function(p){ return catFilter === 'all' || p.cat === catFilter; });

    gridEl.innerHTML = list.map(function(p){
      var images = PRODUCT_IMAGES[p.id] || [];
      var thumbs = images.map(function(src, i){
        return '<div class="pm-thumb"><img src="'+src+'" alt=""><button type="button" class="pm-thumb-del" data-pid="'+p.id+'" data-idx="'+i+'">&times;</button></div>';
      }).join('');
      var full = images.length >= MAX_IMAGES_PER_PRODUCT;

      return '' +
        '<div class="pm-card" data-pid="'+p.id+'">' +
          '<div class="pm-card-head">' +
            '<span class="pm-name">'+p.name+'</span>' +
            '<span class="pm-count">'+images.length+' / '+MAX_IMAGES_PER_PRODUCT+' images</span>' +
          '</div>' +
          '<div class="pm-thumbs">'+thumbs+'</div>' +
          '<div class="pm-upload-row">' +
            '<input type="file" accept="image/*" multiple data-pid="'+p.id+'" class="pm-file-input" '+(full ? 'disabled' : '')+'>' +
            '<span class="pm-upload-msg" id="pm-msg-'+p.id+'">'+(full ? 'Maximum reached — delete a photo to add another.' : '')+'</span>' +
          '</div>' +
        '</div>';
    }).join('');

    gridEl.querySelectorAll('.pm-file-input').forEach(function(input){
      input.addEventListener('change', function(){
        handleFileUpload(input.dataset.pid, input.files);
        input.value = '';
      });
    });
    gridEl.querySelectorAll('.pm-thumb-del').forEach(function(btn){
      btn.addEventListener('click', function(){
        deleteProductImage(btn.dataset.pid, parseInt(btn.dataset.idx, 10));
      });
    });
  }

  document.getElementById('pm-category-filter').addEventListener('change', renderProductManager);

  // Resize + compress an image file in-browser before upload, so blobs
  // stay small and uploads stay fast — most phone photos are 3-6 MB
  // straight out of the camera, far larger than needed for the web.
  function resizeImageFile(file, maxDim, quality){
    return new Promise(function(resolve, reject){
      var img = new Image();
      var reader = new FileReader();
      reader.onload = function(){
        img.onload = function(){
          var w = img.width, h = img.height;
          if(w > h && w > maxDim){ h = Math.round(h * (maxDim / w)); w = maxDim; }
          else if(h > maxDim){ w = Math.round(w * (maxDim / h)); h = maxDim; }
          var canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.onerror = reject;
        img.src = reader.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function handleFileUpload(productId, files){
    var msgEl = document.getElementById('pm-msg-' + productId);
    var existingCount = (PRODUCT_IMAGES[productId] || []).length;
    var fileList = Array.prototype.slice.call(files);

    if(existingCount + fileList.length > MAX_IMAGES_PER_PRODUCT){
      msgEl.className = 'pm-upload-msg err';
      msgEl.textContent = 'You can add ' + (MAX_IMAGES_PER_PRODUCT - existingCount) + ' more photo(s) to this product (limit ' + MAX_IMAGES_PER_PRODUCT + ').';
      fileList = fileList.slice(0, Math.max(0, MAX_IMAGES_PER_PRODUCT - existingCount));
      if(fileList.length === 0) return;
    } else {
      msgEl.className = 'pm-upload-msg';
      msgEl.textContent = 'Uploading…';
    }

    // Upload one at a time to keep request sizes small and predictable.
    var chain = Promise.resolve();
    fileList.forEach(function(file){
      chain = chain.then(function(){
        return resizeImageFile(file, 1000, 0.8).then(function(dataUrl){
          return fetch('/.netlify/functions/product-images', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ secret: currentSecret(), productId: productId, image: dataUrl })
          }).then(function(res){ return res.json(); });
        });
      }).then(function(result){
        if(result && result.images) PRODUCT_IMAGES[productId] = result.images;
      });
    });

    chain.then(function(){
      msgEl.className = 'pm-upload-msg ok';
      msgEl.textContent = 'Saved.';
      renderProductManager();
    }).catch(function(){
      msgEl.className = 'pm-upload-msg err';
      msgEl.textContent = 'Upload failed — please try again.';
    });
  }

  function deleteProductImage(productId, index){
    fetch('/.netlify/functions/product-images', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ secret: currentSecret(), productId: productId, action: 'delete', index: index })
    })
      .then(function(res){ return res.json(); })
      .then(function(result){
        if(result && result.images) PRODUCT_IMAGES[productId] = result.images;
        renderProductManager();
      })
      .catch(function(){ alert('Could not delete that photo — please try again.'); });
  }

  // =====================================================================
  // Store status (holiday / temporary closure)
  // =====================================================================
  function loadStoreSettings(){
    fetch('/.netlify/functions/store-settings')
      .then(function(res){ return res.json(); })
      .then(function(settings){
        settings = settings || {};
        document.getElementById('store-closed-toggle').checked = !!settings.closed;
        document.getElementById('store-message').value = settings.message || '';
        document.getElementById('store-reopen-date').value = settings.reopenDate || '';
        updateStoreStatusLabel();
      })
      .catch(function(){ /* leave defaults */ });
  }

  function updateStoreStatusLabel(){
    var closed = document.getElementById('store-closed-toggle').checked;
    document.getElementById('store-status-label').textContent = closed ? 'closed' : 'open';
  }

  document.getElementById('store-closed-toggle').addEventListener('change', updateStoreStatusLabel);

  document.getElementById('save-settings-btn').addEventListener('click', function(){
    var btn = document.getElementById('save-settings-btn');
    var msgEl = document.getElementById('settings-save-msg');
    var payload = {
      secret: currentSecret(),
      closed: document.getElementById('store-closed-toggle').checked,
      message: document.getElementById('store-message').value.trim(),
      reopenDate: document.getElementById('store-reopen-date').value.trim()
    };

    btn.disabled = true;
    fetch('/.netlify/functions/store-settings', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
      .then(function(res){
        if(!res.ok) throw new Error('save failed');
        return res.json();
      })
      .then(function(){
        btn.disabled = false;
        msgEl.className = 'settings-save-msg ok';
        msgEl.textContent = 'Saved. Customers will see this the next time they load the site.';
      })
      .catch(function(){
        btn.disabled = false;
        msgEl.className = 'settings-save-msg err';
        msgEl.textContent = 'Could not save — please try again.';
      });
  });
</script>
